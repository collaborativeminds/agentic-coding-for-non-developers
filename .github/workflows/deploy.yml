name: Build and Deploy Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc

      - name: Build site
        run: |
          mkdir -p _site

          # Download GitHub Markdown CSS
          curl -sL https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css \
            -o _site/github-markdown.min.css

          # HTML template
          cat > /tmp/template.html << 'TEMPLATE'
          <!DOCTYPE html>
          <html lang="sv">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>$title$</title>
            <link rel="stylesheet" href="github-markdown.min.css">
            <style>
              body {
                box-sizing: border-box;
                min-width: 200px;
                max-width: 980px;
                margin: 0 auto;
                padding: 45px;
              }
              @media (max-width: 767px) {
                body { padding: 15px; }
              }
            </style>
          </head>
          <body class="markdown-body">
          $body$
          </body>
          </html>
          TEMPLATE

          # Convert all .md files except README.md
          for f in *.md; do
            [ "$f" = "README.md" ] && continue

            basename="${f%.md}"

            # Rewrite internal .md links to .html
            sed 's/(\([^)]*\)\.md)/(\1.html)/g' "$f" > /tmp/processed.md

            # Extract title from first heading
            title=$(grep -m1 '^#' "$f" | sed 's/^#\+ //')

            pandoc /tmp/processed.md \
              --template=/tmp/template.html \
              --metadata title="$title" \
              -o "_site/${basename}.html"

            echo "Built: ${basename}.html"
          done

          # course_agenda_sv is the index page
          cp _site/course_agenda_sv.html _site/index.html
          echo "Set index.html from course_agenda_sv.html"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
